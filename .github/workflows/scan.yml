name: News Hunter scan

on:
  schedule:
    # Cron */5 sofre throttle severo no GHA durante picos. Em vez disso,
    # 6 entradas hourly explicitas (a cada 10 min) — cada uma tem seu proprio
    # bucket de scheduling, GHA respeita melhor.
    - cron: '2 * * * *'
    - cron: '12 * * * *'
    - cron: '22 * * * *'
    - cron: '32 * * * *'
    - cron: '42 * * * *'
    - cron: '52 * * * *'
  workflow_dispatch:

concurrency:
  group: scanner
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install --no-cache-dir -r requirements.txt

      - run: python news_hunter_service.py --once
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
